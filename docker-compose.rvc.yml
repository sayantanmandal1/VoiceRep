# Docker Compose for Voice Cloning with RVC/fairseq support
# Uses NVIDIA GPU for acceleration

services:
  # Redis for task queue and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend with RVC support
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.rvc
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./results:/app/results
      - ./backend/logs:/app/logs
      - rvc_models:/app/rvc_models
    environment:
      - DATABASE_URL=sqlite:///./voice_cloning.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Celery Worker with GPU support
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.rvc
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./results:/app/results
      - ./backend/logs:/app/logs
      - rvc_models:/app/rvc_models
    environment:
      - DATABASE_URL=sqlite:///./voice_cloning.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2

  # Celery Flower (Task Monitor)
  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.rvc
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    command: celery -A app.core.celery_app flower --port=5555

volumes:
  redis_data:
  rvc_models:
